services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-devices
    networks:
      - devices-net
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma-devices
    networks:
      - devices-net
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  model-puller:
    image: python:3.12-slim
    container_name: model-puller
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN}
    command: >
      sh -c '
        pip install -q huggingface_hub &&
        hf download Qwen/Qwen2.5-3B-Instruct
      '

  vllm:
    build: docker/vllm
    container_name: vllm-devices
    networks:
      - devices-net
    ports:
      - "8080:8000"
    shm_size: '2gb'
    environment:
      OMP_NUM_THREADS: "6"
      MKL_NUM_THREADS: "6"
      VLLM_CPU_KVCACHE_SPACE: "4"
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      model-puller:
        condition: service_completed_successfully
    command: >
      --model Qwen/Qwen2.5-3B-Instruct
      --host 0.0.0.0
      --port 8000
      --tokenizer-mode auto
      --trust-remote-code
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser hermes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  app:
    build: .
    container_name: app-devices
    networks:
      - devices-net
    ports:
      - "8501:8501"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_MODEL: Qwen/Qwen2.5-3B-Instruct
      AGENT_MAX_STEPS: "6"
    depends_on:
      vllm:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: >
      sh -c '
        echo "Waiting for vLLM...";
        until curl -sf http://vllm:8000/health > /dev/null 2>&1; do
          echo "  vLLM not ready, retrying in 10s...";
          sleep 10;
        done;
        echo "vLLM ready. Starting Streamlit.";
        exec streamlit run app.py
          --server.port=8501
          --server.address=0.0.0.0
          --server.headless=true
      '

networks:
  devices-net:
    driver: bridge

volumes:
  neo4j_data:
  chroma_data:
  hf_cache:
