services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-devices
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma-devices
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-devices
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: devices-app
    ports:
      - "8501:8501"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  neo4j_data:
  chroma_data:
  ollama_data:
