services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-devices
    networks:
      - devices-net
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma-devices
    networks:
      - devices-net
    ports:
      - "8000:8000"
    environment:
      CHROMA_SERVER_AUTHN_PROVIDER: "chromadb.auth.token_authn.TokenAuthenticationServerProvider"
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_TOKEN}
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  model-puller:
    image: python:3.12-slim
    container_name: model-puller
    volumes:
      - models_data:/models
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    command: >
      sh -c '
        pip install -q huggingface_hub &&
        if [ ! -f /models/model.gguf ]; then
          python -c "from huggingface_hub import hf_hub_download; hf_hub_download(repo_id=\"bartowski/Qwen2.5-3B-Instruct-GGUF\", filename=\"Qwen2.5-3B-Instruct-Q4_K_M.gguf\", local_dir=\"/models\")" &&
          mv /models/Qwen2.5-3B-Instruct-Q4_K_M.gguf /models/model.gguf;
        fi
      '

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llm-devices
    networks:
      - devices-net
    ports:
      - "8080:8080"
    volumes:
      - models_data:/models
    depends_on:
      model-puller:
        condition: service_completed_successfully
    command: ["-m", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8080", "--ctx-size", "4096", "--threads", "6", "--jinja"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  app:
    build: .
    container_name: app-devices
    networks:
      - devices-net
    ports:
      - "8501:8501"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_TOKEN: ${CHROMA_TOKEN}
      LLM_BASE_URL: http://llama-cpp:8080/v1
      LLM_MODEL: qwen2.5-3b
      AGENT_MAX_STEPS: "6"
    depends_on:
      llama-cpp:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: >
      sh -c '
        echo "Waiting for llama.cpp...";
        until curl -sf http://llama-cpp:8080/health > /dev/null 2>&1; do
          echo "  llama.cpp not ready, retrying in 10s...";
          sleep 10;
        done;
        echo "llama.cpp ready. Starting Streamlit.";
        exec streamlit run app.py
          --server.port=8501
          --server.address=0.0.0.0
          --server.headless=true
      '

networks:
  devices-net:
    driver: bridge

volumes:
  neo4j_data:
  chroma_data:
  models_data:
